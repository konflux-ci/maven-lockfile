name: Lockfile
on:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  check-lockfile:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            repo.maven.apache.org:443
            repo1.maven.org:443
            sh.jbang.dev:443

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Verify action checksums
        uses: chains-project/maven-lockfile/.github/actions/ghasum@c8ab8e4739f34b397457c22da0d80e7a14f75476 # 5.14.2

      - name: Regenerate lockfile
        uses: chains-project/maven-lockfile@c8ab8e4739f34b397457c22da0d80e7a14f75476 # 5.14.2
        with:
          github-token: ${{ github.token }}
          include-maven-plugins: true
          commit-lockfile: false

      - name: Check for lockfile changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with updated lockfile
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="lockfile/update-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b $BRANCH
          git add lockfile.json maven_plugin/lockfile.json
          git commit -m "chore: update lockfile"
          git push origin $BRANCH
          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: update lockfile" \
            --body "Automated lockfile update triggered by push to develop."
