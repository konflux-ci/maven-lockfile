name: Sync fork with upstream

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync main with chains-project/maven-lockfile
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/merge-upstream \
            --method POST \
            --field branch=main
